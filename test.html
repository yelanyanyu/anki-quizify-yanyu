<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quizify — 卡片模板测试器</title>
<link rel="stylesheet" href="Style/quizify.css">
<style>
    :root {
        --toolbar-h: 48px;
        --bottom-h: 64px;
    }

    #toolbar {
        position: fixed; top: 0; left: 0; right: 0;
        height: var(--toolbar-h);
        background: #2c2c2c; color: #ccc;
        display: flex; align-items: center; gap: 10px;
        padding: 0 16px; z-index: 9999;
        font-family: Arial, sans-serif; font-size: 13px;
    }
    #toolbar strong { color: #fff; font-size: 15px; margin-right: 4px; }
    #toolbar button {
        padding: 4px 14px; border: 1px solid #555; border-radius: 4px;
        background: #444; color: #ddd; cursor: pointer; font-size: 13px;
        white-space: nowrap;
    }
    #toolbar button:hover { background: #666; }
    #toolbar button.active { background: #4a90d9; border-color: #6ab0ff; color: #fff; }
    #toolbar button.primary { background: #c47a3a; border-color: #e09a5a; }
    #toolbar button.primary:hover { background: #d48a4a; }
    #toolbar .sep { color: #555; }
    #toolbar .hint { color: #888; font-size: 12px; }
    #card-index { color: #aaa; font-size: 12px; min-width: 60px; text-align: center; }

    body {
        padding-top: var(--toolbar-h);
        padding-bottom: var(--bottom-h);
        min-height: 100vh;
        box-sizing: border-box;
    }

    #card-area {
        padding: 12px 8px;
    }

    #bottom-bar {
        position: fixed; bottom: 0; left: 0; right: 0;
        height: var(--bottom-h);
        background: #f5f0e8; border-top: 1px solid #ddd;
        display: flex; align-items: center; justify-content: center; gap: 12px;
        z-index: 9999;
    }
    .nightMode #bottom-bar { background: #2a2738; border-color: #444; }

    #btn-reveal {
        padding: 10px 40px; font-size: 16px; font-weight: bold;
        border: none; border-radius: 6px; cursor: pointer;
        background: #c47a3a; color: #fff; letter-spacing: 0.05em;
        transition: all 0.2s;
    }
    #btn-reveal:hover { background: #d48a4a; transform: translateY(-1px); }
    #btn-reveal:active { transform: translateY(0); }

    #btn-reveal.is-back { background: #5e7987; }
    #btn-reveal.is-back:hover { background: #6e8997; }

    .ease-btns { display: none; gap: 8px; }
    .ease-btns.show { display: flex; }
    .ease-btns button {
        padding: 8px 18px; font-size: 14px; font-weight: bold;
        border: none; border-radius: 6px; cursor: pointer; color: #fff;
        transition: all 0.15s;
    }
    .ease-btns button:hover { transform: translateY(-1px); }
    .btn-again { background: #c5413a; }
    .btn-hard { background: #c47a3a; }
    .btn-good { background: #5a8a4a; }
    .btn-easy { background: #3a7aba; }

    /* 卡片切换过渡 */
    #card-area { transition: opacity 0.15s; }
    #card-area.fading { opacity: 0; }

    /* toolbar 响应式 */
    @media (max-width: 700px) {
        #toolbar { gap: 4px; padding: 0 6px; font-size: 11px; flex-wrap: wrap; height: auto; padding: 6px; }
        #toolbar button { padding: 3px 8px; font-size: 11px; }
        #toolbar .hint { display: none; }
        body { padding-top: 80px; }
    }
</style>
</head>
<body class="card">

<!-- ====== 顶部工具栏 ====== -->
<div id="toolbar">
    <strong>Quizify 测试器</strong>
    <span class="sep">|</span>
    <span id="card-index">1/3</span>
    <button onclick="prevCard()">◀ 上一张</button>
    <button onclick="nextCard()">下一张 ▶</button>
    <select id="card-select" onchange="jumpToCard(this.value)" style="padding:4px 8px;border-radius:4px;background:#444;color:#ddd;border:1px solid #555;font-size:13px;">
        <option value="0">卡片 1 — 全部模块</option>
        <option value="1">卡片 2 — 填空 + 单选</option>
        <option value="2">卡片 3 — 多选 + 折叠 + 揭示</option>
    </select>
    <span class="sep">|</span>
    <button id="btn-day" class="active" onclick="setMode('day')">日间</button>
    <button id="btn-night" onclick="setMode('night')">夜间</button>
    <span class="sep">|</span>
    <span class="hint">Space / 点击「显示答案」翻面 · 1-4 评分</span>
</div>

<!-- ====== 卡片区域 (JS 动态渲染) ====== -->
<div id="card-area"></div>

<!-- ====== 底部翻面/评分栏 ====== -->
<div id="bottom-bar">
    <button id="btn-reveal" onclick="flipCard()">显示答案</button>
    <div id="ease-btns" class="ease-btns">
        <button class="btn-again" onclick="rate(1)" title="Again">1 重来</button>
        <button class="btn-hard" onclick="rate(2)" title="Hard">2 困难</button>
        <button class="btn-good" onclick="rate(3)" title="Good">3 良好</button>
        <button class="btn-easy" onclick="rate(4)" title="Easy">4 简单</button>
    </div>
</div>

<!-- 全局交互函数 (与原模板完全一致)                                   -->
<!-- ================================================================ -->
<script>
function playAudio(ele) {
    const audio = ele.querySelector('audio');
    if (audio) { audio.pause(); audio.currentTime = 0; audio.play(); }
}
function playAutoAudio() {
    const usAudio = document.querySelector('.pronunciation-us audio');
    const ukAudio = document.querySelector('.pronunciation-uk audio');
    if (usAudio) { usAudio.pause(); usAudio.currentTime = 0; usAudio.play(); }
    else if (ukAudio) { ukAudio.pause(); ukAudio.currentTime = 0; ukAudio.play(); }
}

function toggleReveal(el) {
    const secret = el.querySelector('.secret');
    if (secret.style.display === "inline") {
        secret.style.display = "none";
        el.classList.remove("active");
    } else {
        secret.style.display = "inline";
        el.classList.add("active");
    }
}

function toggleExpand(el) {
    const collapse = el.nextElementSibling;
    if (collapse.style.display === "block") {
        collapse.style.display = "none";
        el.classList.remove("active");
    } else {
        collapse.style.display = "block";
        el.classList.add("active");
    }
}

function togglePopup(popup, e) {
    const comment = popup.querySelector('.comment');
    if (comment.style.visibility === "visible") {
        comment.style.opacity = 0;
        comment.style.visibility = "hidden";
    } else {
        positionComment(popup, comment);
        comment.style.visibility = "visible";
        comment.style.opacity = 1;
    }
    e.stopPropagation();
}

function positionComment(popup, comment) {
    const popupRect = popup.getBoundingClientRect();
    let commentRect = comment.getBoundingClientRect();
    const pageWidth = window.innerWidth;
    const defaultLeft = popupRect.left + (popupRect.width - commentRect.width) / 2;
    const adjustedLeft = Math.max(10, Math.min(defaultLeft, pageWidth - commentRect.width - 10));
    comment.style.left = `${adjustedLeft}px`;
    comment.style.whiteSpace = "normal";
    commentRect = comment.getBoundingClientRect();
    let adjustedTop = popupRect.top - commentRect.height - 10;
    if (adjustedTop < 0) {
        adjustedTop = popupRect.bottom + 10;
        comment.style.setProperty("--comment-after-top", "-8px");
        comment.style.setProperty("--comment-after-bottom", "auto");
        comment.style.setProperty("--comment-after-border-top", "none");
        comment.style.setProperty("--comment-after-border-bottom", "8px solid var(--comment-bg)");
    }
    comment.style.top = `${adjustedTop}px`;
    const arrowOffset = defaultLeft - adjustedLeft;
    comment.style.setProperty("--comment-after-left", `${arrowOffset}px`);
}

function manageBlank(blank, allowInput, allowRepeat) {
    if (allowInput === undefined) allowInput = true;
    if (allowRepeat === undefined) allowRepeat = true;
    const key = blank.querySelector('.key');
    const entry = blank.querySelector('.entry');
    if (allowInput) {
        if (entry.style.display === "inline") {
            entry.style.display = "none";
            key.style.display = "inline";
            requestAnimationFrame(() => { key.style.opacity = 1; });
        } else {
            key.style.opacity = 0;
            key.style.display = "none";
            entry.style.display = "inline";
            if (allowRepeat) {
                entry.classList.remove("correct", "incorrect");
                entry.textContent = "";
                entry.contentEditable = true;
            }
            if (entry.contentEditable === "true") {
                entry.focus();
                editEntry(entry, key, blank);
            }
        }
    } else {
        key.style.opacity = 1 - key.style.opacity;
    }
}

function editEntry(entry, key, blank) {
    entry.addEventListener("keydown", (event) => {
        if (event.key === "Backspace") { event.stopPropagation(); }
    });
    entry.onblur = () => {
        entry.contentEditable = false;
        const answer = entry.textContent.trim();
        if (!answer) {
            entry.style.display = "none";
            key.style.display = "inline";
            requestAnimationFrame(() => { key.style.opacity = 1; });
            return;
        }
        if (answer === key.textContent.trim()) {
            entry.classList.add("correct");
            entry.textContent = `${answer}✔`;
            blank.setAttribute("tabindex", "-1");
            blank.style.pointerEvents = 'none';
        } else {
            entry.classList.add("incorrect");
            entry.textContent = `${answer}✘`;
        }
    };
}

function shuffleOptions(options) {
    let labels = Array.from(options.getElementsByTagName("label"));
    for (let i = labels.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [labels[i], labels[j]] = [labels[j], labels[i]];
    }
    labels.forEach(label => options.appendChild(label));
}

function restoreOptions(options) {
    const labels = Array.from(options.getElementsByTagName("label")).map(label => {
        const inputValue = label.querySelector('input').value;
        return { label, inputValue };
    });
    labels.sort((a, b) => a.inputValue.localeCompare(b.inputValue));
    labels.forEach(item => options.appendChild(item.label));
}

function validateChoice(span, shouldShuffle, showQuestionType) {
    if (shouldShuffle === undefined) shouldShuffle = true;
    if (showQuestionType === undefined) showQuestionType = true;
    const isAnswered = span.getAttribute("data-is-answered") === "true";
    const correct = span.getAttribute("data-correct-answers");
    const options = span.previousElementSibling;
    if (isAnswered) {
        Array.from(options.getElementsByTagName("label")).forEach(label => {
            label.classList.remove("correct", "incorrect", "not-selected");
            const input = label.querySelector('input');
            const seq = label.querySelector('.option-seq');
            input.disabled = false;
            input.checked = false;
            seq.style.display = "none";
            input.style.display = "inline-block";
        });
        if (shouldShuffle) { shuffleOptions(options); }
        if (showQuestionType) {
            span.textContent = correct.length === 1 ? "单选题 | " : "多选题 | ";
        } else {
            span.textContent = "";
        }
        span.textContent += "点击显示答案";
        span.classList.remove("correct", "incorrect", "incomplete");
        span.setAttribute("data-is-answered", "false");
    } else {
        restoreOptions(options);
        Array.from(options.getElementsByTagName("label")).forEach(label => {
            const input = label.querySelector('input');
            const seq = label.querySelector('.option-seq');
            input.disabled = true;
            input.style.display = "none";
            seq.style.display = "inline-block";
        });
        const correctArray = correct.split("").sort();
        let selectedOptions = [];
        Array.from(options.getElementsByTagName("input")).forEach(input => {
            if (input.checked) { selectedOptions.push(input.value); }
        });
        selectedOptions.sort();
        if (selectedOptions.length === 0) {
            span.textContent = "你没有回答";
            span.classList.add("incorrect");
        } else if (JSON.stringify(selectedOptions) === JSON.stringify(correctArray)) {
            span.textContent = "回答正确";
            span.classList.add("correct");
        } else {
            span.textContent = "你的答案：" + selectedOptions.join("");
            if (selectedOptions.every(option => correctArray.includes(option))) {
                span.classList.add("incomplete");
            } else {
                span.classList.add("incorrect");
            }
        }
        span.textContent += " | 正确答案：" + correctArray.join("");
        Array.from(options.getElementsByTagName("label")).forEach(label => {
            const input = label.querySelector('input');
            const value = input.value;
            if (input.checked) {
                if (correct.includes(value)) { label.classList.add("correct"); }
                else { label.classList.add("incorrect"); }
            } else {
                if (correct.includes(value)) { label.classList.add("not-selected"); }
            }
        });
        span.setAttribute("data-is-answered", "true");
    }
}
</script>

<!-- 卡片渲染引擎                                                     -->
<!-- ================================================================ -->
<script>
var currentCard = 0;
var showingBack = false;

function buildCardHTML(card, showBack) {
    var html = '<div class="quizify-flashcard">';
    html += '<div class="quizify-deck">' + card.deck + '</div>';
    html += '<div class="quizify-field quizify-field--front">' + card.front + '</div>';

    if (showBack && card.back) {
        html += '<hr class="quizify-divider quizify-divider--answer">';
        html += '<div class="quizify-field quizify-field--back">' + card.back + '</div>';
    }

    if (card.tags) {
        html += '<div class="quizify-tags">';
        var tags = card.tags.split(' ');
        tags.forEach(function(t) {
            html += '<span class="quizify-tag">' + t + '</span>';
        });
        html += '</div>';
    }

    html += '</div>';
    return html;
}

function setupBreadcrumbs() {
    var deckEl = document.querySelector(".quizify-deck");
    if (!deckEl) return;
    var subDecks = deckEl.innerHTML.split("::").filter(Boolean);
    var html = [];
    subDecks.forEach(function(subDeck) {
        html.push("<span class='quizify-subdeck'>" + subDeck + "</span>");
    });
    deckEl.innerHTML = html.join("&nbsp;/&nbsp;");
}

function setupTags() {
    var tagsContainerEl = document.querySelectorAll(".quizify-tags > *");
    if (tagsContainerEl.length > 0) {
        tagsContainerEl.forEach(function(tagEl) {
            tagEl.classList.add("quizify-tag");
            var childTag = tagEl.innerHTML.split("::").filter(Boolean);
            tagEl.innerHTML = childTag[childTag.length - 1].trim();
        });
    }
}

function runMarkupReplacement() {
    document.querySelectorAll('.quizify-field').forEach(function(el, index) {
        var mcqIndex = 0;
        el.innerHTML = el.innerHTML.replace(
            /\[([^\]]+)\]\^\((([^()]|\([^()]*\))*?)\)/g,
            '<span class="popup" onclick="togglePopup(this, event)">$1<span class="comment">$2</span></span>'
        ).replace(
            /\[\[(.*?)::(?:<br>)?(.*?)\]\](?:<br>)?/g,
            '<div class="expand"><div class="caption" onclick="toggleExpand(this)">$1</div><div class="collapse">$2</div></div>'
        ).replace(
            /(?<!\\)\(\((.*?)::(.*?[^\\])\)\)/g,
            '<span class="reveal" onclick="toggleReveal(this)">$1<span class="secret">$2</span></span>'
        ).replace(
            /\{\{([^\}]+)\}\}/g,
            '<span class="blank" onclick="manageBlank(this)"><span class="key">$1</span><span class="entry" contenteditable="true"></span></span>'
        ).replace(/\[([\s\S]+?)\]::\(([A-Za-z]+)\)(?:<br>)?/g, function(match, options, correct) {
            var mcqName = 'front-mcq-' + index + '-' + (mcqIndex++);
            options = options.replace(/<br>([A-Za-z])\. ?(.*?)(?=(<br>[A-Za-z]\.|$))/g, function(m, letter, description) {
                return '<label class="option"><span class="option-header"><input type="' + (correct.length === 1 ? 'radio' : 'checkbox') + '" name="' + mcqName + '" value="' + letter + '"><span class="option-seq">' + letter + '. </span></span><span class="option-desc">' + description + '</span></label>';
            });
            var mcqType = correct.length === 1 ? '单选题 | ' : '多选题 | ';
            return '<div class="choice"><div class="options">' + options + '</div><span class="feedback" onclick="validateChoice(this)" data-correct-answers="' + correct + '" data-is-answered="false">' + mcqType + '点击显示答案</span></div>';
        });
    });
}

function bindEvents() {
    document.querySelectorAll('.blank').forEach(function(el) {
        el.setAttribute("tabindex", "0");
        el.addEventListener("focus", function() { manageBlank(this); });
        el.addEventListener("keydown", function(e) {
            if (e.key === "Control") { e.preventDefault(); manageBlank(this); }
        });
        el.addEventListener("mousedown", function(e) { e.preventDefault(); });
    });

    document.querySelectorAll('input[type="checkbox"]').forEach(function(el) {
        el.addEventListener("keydown", function(e) {
            if (e.key === "Control") { el.checked = !el.checked; }
        });
    });

    document.querySelectorAll('.feedback').forEach(function(el) {
        el.setAttribute("tabindex", "0");
        el.addEventListener("keydown", function(e) {
            if (e.key === "Control") { e.preventDefault(); validateChoice(this); }
        });
    });

    document.querySelectorAll('.reveal').forEach(function(el) {
        el.setAttribute("tabindex", "0");
        el.addEventListener("keydown", function(e) {
            if (e.key === "Control") { e.preventDefault(); toggleReveal(this); }
        });
    });

    document.querySelectorAll('.caption').forEach(function(el) {
        el.setAttribute("tabindex", "0");
        el.addEventListener("keydown", function(e) {
            if (e.key === "Control") { e.preventDefault(); toggleExpand(this); }
        });
    });

    document.querySelectorAll('.popup').forEach(function(el) {
        el.setAttribute("tabindex", "0");
        el.addEventListener("keydown", function(e) {
            if (e.key === "Control") { e.preventDefault(); togglePopup(this, e); }
        });
        el.addEventListener("blur", function() {
            var comment = el.querySelector('.comment');
            comment.style.opacity = 0;
            comment.style.visibility = "hidden";
        });
    });

    // 正面：所有 key 淡入
    document.querySelectorAll('.key').forEach(function(key) {
        requestAnimationFrame(function() { key.style.opacity = 1; });
    });
}

// 正面：选项随机排列
function setupFront() {
    document.querySelectorAll('.options').forEach(shuffleOptions);
}

// 背面：选项恢复原序 + 显示正确答案 + 选择题全部标记为已作答
function setupBack() {
    document.querySelectorAll('.feedback').forEach(function(span) {
        var correct = span.getAttribute("data-correct-answers");
        var options = span.previousElementSibling;
        restoreOptions(options);
        Array.from(options.getElementsByTagName("label")).forEach(function(label) {
            var seq = label.querySelector('.option-seq');
            var input = label.querySelector('input');
            input.disabled = true;
            input.style.display = "none";
            seq.style.display = "inline-block";
            if (correct.includes(input.value)) {
                label.classList.add("correct");
            }
        });
        span.textContent = "正确答案：" + correct.split("").sort().join("");
        span.classList.add("correct");
        span.setAttribute("data-is-answered", "true");
    });
}

function renderCard(index, showBack) {
    var card = CARDS[index];
    var area = document.getElementById('card-area');
    area.classList.add('fading');

    setTimeout(function() {
        area.innerHTML = buildCardHTML(card, showBack);
        setupBreadcrumbs();
        setupTags();
        runMarkupReplacement();
        bindEvents();

        if (showBack) {
            setupBack();
        } else {
            setupFront();
        }

        area.classList.remove('fading');
        updateUI(showBack);
    }, 120);
}

function updateUI(showBack) {
    showingBack = showBack;
    var btn = document.getElementById('btn-reveal');
    var easeDiv = document.getElementById('ease-btns');
    var idxEl = document.getElementById('card-index');
    var sel = document.getElementById('card-select');

    idxEl.textContent = (currentCard + 1) + '/' + CARDS.length;
    sel.value = currentCard;

    if (showBack) {
        btn.textContent = '◀ 返回正面';
        btn.className = 'is-back';
        easeDiv.classList.add('show');
    } else {
        btn.textContent = '显示答案';
        btn.className = '';
        easeDiv.classList.remove('show');
    }
}

function flipCard() {
    if (showingBack) {
        renderCard(currentCard, false);
    } else {
        renderCard(currentCard, true);
    }
}

function prevCard() {
    currentCard = (currentCard - 1 + CARDS.length) % CARDS.length;
    renderCard(currentCard, false);
}

function nextCard() {
    currentCard = (currentCard + 1) % CARDS.length;
    renderCard(currentCard, false);
}

function jumpToCard(index) {
    currentCard = parseInt(index);
    renderCard(currentCard, false);
}

function rate(n) {
    // 模拟 Anki 评分：翻到下一张的正面
    var labels = ['', 'Again', 'Hard', 'Good', 'Easy'];
    console.log('Anki 评分: ' + labels[n] + ' (' + n + ') — 仅在真实 Anki 中生效');
    nextCard();
}
</script>

<!-- ================================================================ -->
<!-- 键盘快捷键 & 初始化                                              -->
<!-- ================================================================ -->
<script>
document.addEventListener("keydown", function(event) {
    // 全局快捷键（不在 contenteditable 输入框中时生效）
    if (document.activeElement && document.activeElement.contentEditable === "true") return;

    if (event.key === " " || event.code === "Space") {
        event.preventDefault();
        flipCard();
    }

    if (event.shiftKey && event.code === 'KeyR') {
        playAutoAudio();
    }

    if (event.key === "Enter") {
        event.preventDefault();
        document.activeElement.blur();
    }

    // 1-4 评分键
    if (showingBack) {
        switch (event.key) {
            case "1": event.preventDefault(); rate(1); break;
            case "2": event.preventDefault(); rate(2); break;
            case "3": event.preventDefault(); rate(3); break;
            case "4": event.preventDefault(); rate(4); break;
        }
    } else {
        switch (event.key) {
            case "1": case "2": case "3": case "4":
                event.preventDefault();
                flipCard();
                break;
        }
    }
});

// 日间/夜间模式
function setMode(mode) {
    var body = document.body;
    var btnDay = document.getElementById('btn-day');
    var btnNight = document.getElementById('btn-night');
    if (mode === 'night') {
        body.classList.add('nightMode');
        btnDay.classList.remove('active');
        btnNight.classList.add('active');
    } else {
        body.classList.remove('nightMode');
        btnDay.classList.add('active');
        btnNight.classList.remove('active');
    }
}

// 启动：渲染第一张卡片的正面
renderCard(0, false);
</script>
